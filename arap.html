<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR/AP — Aqua Pulse</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/water-intel.css?v=20260316">
</head>
<body>
  <script src="assets/js/api.js?v=20260316"></script>
  <script src="assets/js/auth.js?v=20260316"></script>
  <script src="assets/js/common.js?v=20260316"></script>
  <script>
  (function() {
    'use strict';
    var api = bgat.api.apiFetch;
    var apiPost = bgat.api.apiPost;
    var c = bgat.common;

    var content = c.initPage({
      page: 'arap',
      title: 'Accounts Receivable / Payable',
      subtitle: 'Track AR aging, AP bills, and cash position — QuickBooks ready'
    });

    content.innerHTML = '<div class="stat-grid">' + c.skeletonRows(4, 120) + '</div>' +
      '<div class="glass-card" style="padding:24px">' + c.skeletonRows(6, 40) + '</div>';

    var activeTab = 'ar';

    wiAuth.subscribe(function(s) {
      if (s.user && s.authorized && !s.loading) loadARAP();
    });

    async function loadARAP() {
      try {
        var [arSummary, arAging, apSummary, apList] = await Promise.all([
          api('/api/v1/ar/summary').catch(function() { return {}; }),
          api('/api/v1/ar/aging').catch(function() { return { items: [] }; }),
          api('/api/v1/ap/summary').catch(function() { return {}; }),
          api('/api/v1/ap/transactions?per_page=100').catch(function() { return { items: [] }; })
        ]);
        renderARAP(arSummary, arAging.items || [], apSummary, apList.items || []);
      } catch(e) {
        content.innerHTML = '<div class="empty-state"><p>Error loading AR/AP: ' + c.escapeHtml(e.message) + '</p></div>';
      }
    }

    function renderARAP(arSummary, arAging, apSummary, apList) {
      var html = '';

      // Summary cards — combined view
      html += '<div class="stat-grid">';
      html += statCard('AR Outstanding', '$' + formatMoney((arSummary.total_outstanding || 0) / 100), ICONS.arrowIn, '#3b82f6');
      html += statCard('AR Overdue', '$' + formatMoney((arSummary.total_overdue || 0) / 100), ICONS.alertTriangle, '#ef4444');
      html += statCard('AP Pending', '$' + formatMoney(((apSummary.total_pending || 0) + (apSummary.total_approved || 0)) / 100), ICONS.arrowOut, '#f59e0b');
      html += statCard('AP Overdue', '$' + formatMoney((apSummary.total_overdue || 0) / 100), ICONS.alertCircle, '#ef4444');
      html += '</div>';

      // Tabs
      html += '<div style="display:flex;gap:0;margin-bottom:24px">';
      html += '<button class="btn-sm tab-btn' + (activeTab === 'ar' ? ' active-tab' : '') + '" data-tab="ar" style="border-radius:8px 0 0 8px;flex:1;padding:12px">Accounts Receivable</button>';
      html += '<button class="btn-sm tab-btn' + (activeTab === 'ap' ? ' active-tab' : '') + '" data-tab="ap" style="border-radius:0 8px 8px 0;flex:1;padding:12px">Accounts Payable</button>';
      html += '</div>';

      // AR Tab
      html += '<div id="tabAR" style="display:' + (activeTab === 'ar' ? 'block' : 'none') + '">';

      // AR Aging buckets
      html += '<div class="glass-card" style="padding:24px;margin-bottom:24px">';
      html += '<h3 style="font-family:var(--font-heading);color:var(--cyan);margin:0 0 16px;font-size:0.95rem">Aging Summary</h3>';
      html += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;text-align:center">';
      var agingBuckets = [
        { label: 'Current', amount: arSummary.current_ar || 0, color: '#22c55e' },
        { label: '1-30 Days', amount: arSummary.aging_1_30 || 0, color: '#3b82f6' },
        { label: '31-60 Days', amount: arSummary.aging_31_60 || 0, color: '#f59e0b' },
        { label: '61-90 Days', amount: arSummary.aging_61_90 || 0, color: '#ef4444' },
        { label: '90+ Days', amount: arSummary.aging_90_plus || 0, color: '#dc2626' }
      ];
      agingBuckets.forEach(function(b) {
        html += '<div style="padding:16px;border-radius:8px;background:' + b.color + '10;border:1px solid ' + b.color + '30">';
        html += '<div style="font-size:0.7rem;font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px;color:' + b.color + ';margin-bottom:4px">' + b.label + '</div>';
        html += '<div style="font-size:1.3rem;font-weight:700;color:' + b.color + '">$' + formatMoney(b.amount / 100) + '</div>';
        html += '</div>';
      });
      html += '</div></div>';

      // AR Detail
      html += '<div class="glass-card" style="padding:24px">';
      html += '<h3 style="font-family:var(--font-heading);color:var(--cyan);margin:0 0 16px;font-size:0.95rem">Open Invoices (' + arAging.length + ')</h3>';
      if (arAging.length > 0) {
        html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
        html += '<th>Invoice #</th><th>Customer</th><th style="text-align:right">Amount</th><th>Due Date</th><th>Days Overdue</th><th>Status</th><th></th>';
        html += '</tr></thead><tbody>';
        arAging.forEach(function(inv) {
          var overdue = inv.days_overdue || 0;
          var overdueColor = overdue <= 0 ? '#22c55e' : overdue <= 30 ? '#3b82f6' : overdue <= 60 ? '#f59e0b' : '#ef4444';
          html += '<tr>';
          html += '<td style="color:var(--cyan);font-weight:600">' + c.escapeHtml(inv.invoice_number) + '</td>';
          html += '<td>' + c.escapeHtml(inv.customer_name) + '</td>';
          html += '<td style="text-align:right;font-weight:600">$' + formatMoney(inv.total_cents / 100) + '</td>';
          html += '<td>' + c.formatDate(inv.due_date) + '</td>';
          html += '<td style="color:' + overdueColor + ';font-weight:600">' + (overdue > 0 ? overdue + ' days' : 'Current') + '</td>';
          html += '<td>' + statusBadge(inv.status) + '</td>';
          html += '<td><button class="btn-outline btn-sm" onclick="markPaid(\'' + inv.invoice_number + '\')" style="font-size:0.7rem;padding:2px 8px">Mark Paid</button></td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      } else {
        html += '<div class="empty-state"><p>No outstanding invoices</p></div>';
      }
      html += '</div>';
      html += '</div>';

      // AP Tab
      html += '<div id="tabAP" style="display:' + (activeTab === 'ap' ? 'block' : 'none') + '">';

      // AP Actions
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
      html += '<span class="section-label">Bills & Expenses</span>';
      html += '<button class="btn-primary btn-sm" id="btnNewExpense">+ New Expense</button>';
      html += '</div>';

      // AP Summary
      html += '<div class="glass-card" style="padding:24px;margin-bottom:24px">';
      html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center">';
      html += '<div style="padding:16px;border-radius:8px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3)">';
      html += '<div style="font-size:0.7rem;font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px;color:#f59e0b;margin-bottom:4px">Pending</div>';
      html += '<div style="font-size:1.3rem;font-weight:700;color:#f59e0b">$' + formatMoney((apSummary.total_pending || 0) / 100) + '</div></div>';
      html += '<div style="padding:16px;border-radius:8px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3)">';
      html += '<div style="font-size:0.7rem;font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px;color:#3b82f6;margin-bottom:4px">Approved</div>';
      html += '<div style="font-size:1.3rem;font-weight:700;color:#3b82f6">$' + formatMoney((apSummary.total_approved || 0) / 100) + '</div></div>';
      html += '<div style="padding:16px;border-radius:8px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3)">';
      html += '<div style="font-size:0.7rem;font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px;color:#22c55e;margin-bottom:4px">Paid (Total)</div>';
      html += '<div style="font-size:1.3rem;font-weight:700;color:#22c55e">$' + formatMoney((apSummary.total_paid || 0) / 100) + '</div></div>';
      html += '</div></div>';

      // AP List
      html += '<div class="glass-card" style="padding:24px">';
      if (apList.length > 0) {
        html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
        html += '<th>Vendor</th><th>Category</th><th>Description</th><th style="text-align:right">Amount</th><th>Due Date</th><th>Status</th><th>QB</th><th></th>';
        html += '</tr></thead><tbody>';
        apList.forEach(function(ap) {
          html += '<tr>';
          html += '<td style="color:var(--cyan);font-weight:600">' + c.escapeHtml(ap.vendor_name) + '</td>';
          html += '<td>' + c.escapeHtml(formatCategory(ap.category)) + '</td>';
          html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">' + c.escapeHtml(ap.description || '—') + '</td>';
          html += '<td style="text-align:right;font-weight:600">$' + formatMoney(ap.total_cents / 100) + '</td>';
          html += '<td>' + c.formatDate(ap.due_date) + '</td>';
          html += '<td>' + apStatusBadge(ap.status) + '</td>';
          html += '<td>' + qbBadge(ap.qb_sync_status) + '</td>';
          html += '<td>';
          if (ap.status === 'pending') {
            html += '<button class="btn-outline btn-sm" onclick="approveAP(\'' + ap.id + '\')" style="font-size:0.7rem;padding:2px 8px">Approve</button> ';
          }
          if (ap.status === 'approved') {
            html += '<button class="btn-outline btn-sm" onclick="payAP(\'' + ap.id + '\')" style="font-size:0.7rem;padding:2px 8px">Mark Paid</button>';
          }
          html += '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      } else {
        html += '<div class="empty-state">';
        html += '<svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
        html += '<p>No expenses recorded</p>';
        html += '<p style="font-size:0.8rem;color:var(--white-dim)">Click "New Expense" to add a bill or expense</p>';
        html += '</div>';
      }
      html += '</div>';
      html += '</div>';

      // QB Status
      html += '<div class="glass-card" style="padding:16px;margin-top:24px;display:flex;align-items:center;gap:12px">';
      html += '<div style="width:40px;height:40px;border-radius:8px;background:#2CA01C20;display:flex;align-items:center;justify-content:center">';
      html += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2CA01C" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>';
      html += '</div>';
      html += '<div>';
      html += '<div style="font-family:var(--font-heading);font-size:0.85rem;color:var(--cyan)">QuickBooks Sync</div>';
      html += '<div style="font-size:0.8rem;color:var(--white-dim)">AR invoices and AP bills sync bi-directionally with QuickBooks</div>';
      html += '</div>';
      html += '</div>';

      content.innerHTML = html;

      // Wire tabs
      document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          activeTab = this.getAttribute('data-tab');
          document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active-tab'); });
          this.classList.add('active-tab');
          document.getElementById('tabAR').style.display = activeTab === 'ar' ? 'block' : 'none';
          document.getElementById('tabAP').style.display = activeTab === 'ap' ? 'block' : 'none';
        });
      });

      // Wire new expense
      var btnNew = document.getElementById('btnNewExpense');
      if (btnNew) btnNew.addEventListener('click', showNewExpenseModal);
    }

    function showNewExpenseModal() {
      var overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px';

      var cats = ['operating', 'equipment', 'supplies', 'chemicals', 'lab_fees', 'fuel', 'insurance', 'rent', 'payroll', 'travel', 'maintenance', 'other'];
      var catOpts = '';
      cats.forEach(function(cat) {
        catOpts += '<option value="' + cat + '">' + formatCategory(cat) + '</option>';
      });

      var formHtml = '<div class="glass-card" style="padding:32px;max-width:550px;width:100%;max-height:90vh;overflow-y:auto">';
      formHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">';
      formHtml += '<h2 style="font-family:var(--font-heading);color:var(--cyan);margin:0">New Expense</h2>';
      formHtml += '<button id="closeModal" style="background:none;border:none;color:var(--white-dim);font-size:1.5rem;cursor:pointer">&times;</button>';
      formHtml += '</div>';

      formHtml += '<div style="display:grid;gap:16px">';
      formHtml += formField('Vendor Name *', '<input type="text" id="apVendor" placeholder="Halliburton, Baker Hughes, etc." class="wi-input">');
      formHtml += formField('Vendor Email', '<input type="email" id="apEmail" placeholder="vendor@example.com" class="wi-input">');
      formHtml += formField('Category', '<select id="apCategory" class="wi-input">' + catOpts + '</select>');
      formHtml += formField('Description', '<input type="text" id="apDesc" placeholder="Chemical treatment supplies" class="wi-input">');
      formHtml += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
      formHtml += formField('Amount ($) *', '<input type="number" id="apAmount" min="0" step="0.01" placeholder="0.00" class="wi-input">');
      formHtml += formField('Tax Rate', '<select id="apTax" class="wi-input"><option value="0">No Tax</option><option value="0.0825">8.25% TX Sales Tax</option></select>');
      formHtml += '</div>';
      formHtml += formField('Due Date', '<input type="date" id="apDue" class="wi-input">');
      formHtml += formField('Notes', '<textarea id="apNotes" rows="2" class="wi-input" placeholder="Optional notes..."></textarea>');
      formHtml += '</div>';

      formHtml += '<div style="display:flex;gap:12px;margin-top:24px">';
      formHtml += '<button id="btnSaveExpense" class="btn-primary" style="flex:1">Create Expense</button>';
      formHtml += '<button id="btnCancelExpense" class="btn-outline" style="flex:0">Cancel</button>';
      formHtml += '</div>';
      formHtml += '</div>';

      overlay.innerHTML = formHtml;
      document.body.appendChild(overlay);

      // Default due to 30 days
      var due = new Date();
      due.setDate(due.getDate() + 30);
      document.getElementById('apDue').value = due.toISOString().split('T')[0];

      function closeModal() { document.body.removeChild(overlay); }
      document.getElementById('closeModal').addEventListener('click', closeModal);
      document.getElementById('btnCancelExpense').addEventListener('click', closeModal);
      overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });

      document.getElementById('btnSaveExpense').addEventListener('click', async function() {
        var vendor = document.getElementById('apVendor').value.trim();
        var amount = parseFloat(document.getElementById('apAmount').value);
        if (!vendor) { c.showToast('Vendor name is required', 'error'); return; }
        if (!amount || amount <= 0) { c.showToast('Amount is required', 'error'); return; }

        var btn = this;
        btn.disabled = true;
        btn.textContent = 'Creating...';

        try {
          await apiPost('/api/v1/ap/transactions', {
            vendor_name: vendor,
            vendor_email: document.getElementById('apEmail').value.trim() || undefined,
            category: document.getElementById('apCategory').value,
            description: document.getElementById('apDesc').value.trim() || undefined,
            amount: amount,
            tax_rate: parseFloat(document.getElementById('apTax').value) || 0,
            due_date: document.getElementById('apDue').value || undefined,
            notes: document.getElementById('apNotes').value.trim() || undefined
          });
          c.showToast('Expense created', 'success');
          closeModal();
          loadARAP();
        } catch(e) {
          c.showToast('Error: ' + e.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Create Expense';
        }
      });
    }

    // Global actions
    window.markPaid = async function(invoiceNumber) {
      // Find invoice by number via invoices list, then PATCH
      try {
        var res = await api('/api/v1/invoices?per_page=200');
        var inv = (res.items || []).find(function(i) { return i.invoice_number === invoiceNumber; });
        if (!inv) { c.showToast('Invoice not found', 'error'); return; }
        await api('/api/v1/invoices/' + inv.id, {
          method: 'PATCH',
          body: JSON.stringify({ status: 'paid', paid_date: new Date().toISOString() })
        });
        c.showToast('Invoice marked as paid', 'success');
        loadARAP();
      } catch(e) {
        c.showToast('Error: ' + e.message, 'error');
      }
    };

    window.approveAP = async function(id) {
      try {
        await api('/api/v1/ap/transactions/' + id, {
          method: 'PATCH',
          body: JSON.stringify({ status: 'approved' })
        });
        c.showToast('Expense approved', 'success');
        loadARAP();
      } catch(e) {
        c.showToast('Error: ' + e.message, 'error');
      }
    };

    window.payAP = async function(id) {
      try {
        await api('/api/v1/ap/transactions/' + id, {
          method: 'PATCH',
          body: JSON.stringify({ status: 'paid', paid_date: new Date().toISOString() })
        });
        c.showToast('Expense marked as paid', 'success');
        loadARAP();
      } catch(e) {
        c.showToast('Error: ' + e.message, 'error');
      }
    };

    // Helpers
    var ICONS = {
      arrowIn: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>',
      arrowOut: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>',
      alertTriangle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      alertCircle: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
    };

    function formatMoney(n) {
      return (n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function statCard(label, value, icon, color) {
      return '<div class="stat-card">' +
        '<div class="stat-card-icon" style="background:' + color + '15;border:1px solid ' + color + '30">' +
        icon.replace('stroke="currentColor"', '').replace('<svg', '<svg style="stroke:' + color + '"') +
        '</div>' +
        '<div class="stat-card-label">' + label + '</div>' +
        '<div class="stat-card-value">' + value + '</div>' +
        '</div>';
    }

    function statusBadge(status) {
      var colors = { draft: '#94a3b8', sent: '#3b82f6', paid: '#22c55e', overdue: '#ef4444' };
      var color = colors[status] || '#94a3b8';
      return '<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.7rem;font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px;background:' + color + '20;color:' + color + ';border:1px solid ' + color + '40">' + (status || 'unknown') + '</span>';
    }

    function apStatusBadge(status) {
      var colors = { pending: '#f59e0b', approved: '#3b82f6', paid: '#22c55e', cancelled: '#6b7280' };
      var color = colors[status] || '#94a3b8';
      return '<span style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.7rem;font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px;background:' + color + '20;color:' + color + ';border:1px solid ' + color + '40">' + (status || 'pending') + '</span>';
    }

    function qbBadge(status) {
      if (status === 'synced') return '<span style="color:#22c55e;font-size:0.75rem">&#10003; Synced</span>';
      if (status === 'error') return '<span style="color:#ef4444;font-size:0.75rem">&#10007; Error</span>';
      return '<span style="color:#94a3b8;font-size:0.75rem">&#9675; Pending</span>';
    }

    function formatCategory(cat) {
      if (!cat) return 'Other';
      return cat.replace(/_/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); });
    }

    function formField(label, inputHtml) {
      return '<div>' +
        '<label style="display:block;font-family:var(--font-heading);font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--white-dim);margin-bottom:4px">' + label + '</label>' +
        inputHtml + '</div>';
    }
  })();
  </script>
  <style>
    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,212,255,0.2);
      color: var(--white-dim);
      font-family: var(--font-heading);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: rgba(0,212,255,0.1); }
    .active-tab {
      background: rgba(0,212,255,0.15) !important;
      border-color: var(--cyan) !important;
      color: var(--cyan) !important;
    }
  </style>
</body>
</html>

      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>', title: 'AI Phone Answering', desc: 'Conversational AI answers your business phone 24/7. Handles inquiries, takes messages, books appointments, and transfers to live agents when needed. Custom voice and greeting.', category: 'convo-ai' },

      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>', title: 'Outbound AI Calls', desc: 'AI makes outbound calls for you — appointment reminders, payment follow-ups, satisfaction surveys, and re-engagement campaigns. Natural voice, custom scripts.', category: 'convo-ai' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>', title: 'SMS & Text AI', desc: 'AI responds to text messages instantly. Answers FAQs, confirms appointments, sends quotes, and handles two-way conversations — all from your business number.', category: 'convo-ai' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>', title: 'Voicemail AI', desc: 'AI listens to voicemails, transcribes them, classifies urgency, and routes to the right team member. Sends instant text/email notifications with summary and caller info.', category: 'convo-ai' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>', title: 'Sentiment Analysis', desc: 'Real-time caller sentiment detection. AI flags angry or frustrated callers for immediate attention, tracks satisfaction trends, and identifies at-risk accounts.', category: 'convo-ai' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>', title: 'Call Analytics & Scoring', desc: 'Track call volume, duration, peak hours, conversion rates, and agent performance. AI scores every call for quality and identifies coaching opportunities.', category: 'convo-ai' },
      { divider: true },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>', title: 'Smart Invoicing', desc: 'AI generates, sends, and follows up on invoices automatically. Tracks payments, handles late notices, and reconciles with your books.' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>', title: 'Intelligent Bookings', desc: 'Self-service booking portal for your customers. AI optimizes scheduling, avoids conflicts, and sends reminders.' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>', title: 'Customer Management', desc: 'Full CRM with AI insights. Tracks service history, predicts churn, automates follow-ups, and scores leads.' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>', title: 'Route Optimization', desc: 'AI plans the most efficient routes for your field crews. Saves fuel, reduces drive time, handles real-time rerouting.' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5a2 2 0 0 1-2 2h-1"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>', title: 'Fleet Management', desc: 'Track vehicles, maintenance schedules, mileage, and fuel costs. AI alerts you before breakdowns happen.' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>', title: 'Expense Tracking', desc: 'Snap receipts, auto-categorize expenses, track budgets by project or crew. Exports to QuickBooks, Xero, or CSV.' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>', title: 'AI Chat Assistant', desc: 'Ask questions in plain English. "How much did we spend on fuel last month?" or "Schedule a cleaning at 123 Main St for Thursday."' },
      { icon: '<svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:var(--cyan);stroke-width:2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>', title: 'Analytics Dashboard', desc: 'Revenue trends, crew productivity, customer retention, and P&L — all in real-time with AI-generated insights.' }
    ];

    var INDUSTRIES = [
      'Cleaning Companies', 'HVAC & Plumbing', 'Landscaping', 'Construction',
      'Auto Detailing', 'Property Management', 'Home Services', 'Pest Control',
      'Electrical Contractors', 'Consulting Firms', 'Oilfield Services', 'Delivery & Logistics'
    ];

    var PRICING = [
      { name: 'Starter', price: '$0', period: '/mo', features: ['1 Business', '5 Users', 'Core Modules', 'Email Support', 'Basic Analytics'], popular: false },
      { name: 'Professional', price: '$0', period: '/mo', features: ['3 Businesses', '25 Users', 'All Modules', 'Priority Support', 'Advanced Analytics', 'Route Optimization', 'API Access'], popular: false },
      { name: 'Enterprise', price: '$0', period: '/mo', features: ['Unlimited Businesses', 'Unlimited Users', 'Conversational AI Phone System', 'AI Receptionist & Outbound Calls', 'SMS/Text AI & Voicemail AI', 'Call Analytics & Sentiment', 'White-Label Option', 'Dedicated Support', 'Custom Integrations', 'SLA Guarantee', 'On-Premise Option'], popular: true, active: true }
    ];

    // Settings state — persisted to localStorage
    var SETTINGS_KEY = 'ap_officeai_settings';
    var defaultSettings = {};
    FEATURES.forEach(function(f) { if (f.title) defaultSettings[f.title] = { enabled: true, notifications: true, automate: true }; });
    var settings = JSON.parse(localStorage.getItem(SETTINGS_KEY) || 'null') || defaultSettings;
    function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }

    var showSettings = false;

    function render() {
      var html = '';

      /* ── Stats Bar ── */
      html += '<div class="stat-grid" style="margin-bottom:32px">';
      html += statCard('Modules', '16', c.ICONS.dashboard, 'var(--cyan)');
      html += statCard('Convo AI', '8', c.ICONS.activity, 'var(--teal)');
      html += statCard('24/7 Phone', 'Active', c.ICONS.shield, '#22c55e');
      html += statCard('AI Powered', '100%', c.ICONS.trending, 'var(--blue)');
      html += '</div>';

      /* ── Conversational AI Section ── */
      var convoFeatures = FEATURES.filter(function(f) { return f.category === 'convo-ai'; });
      var officeFeatures = FEATURES.filter(function(f) { return !f.category && !f.divider; });

      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px;border:1px solid rgba(0,212,255,0.2)">';
      html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">';
      html += '<svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:var(--cyan);stroke-width:2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
      html += '<span class="section-label" style="margin:0">Conversational AI</span>';
      html += '<span style="font-size:0.65rem;padding:3px 8px;background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3);border-radius:4px;font-weight:600;letter-spacing:0.5px">INCLUDED</span>';
      html += '</div>';
      html += '<p style="font-size:0.85rem;color:var(--white-dim);margin-bottom:16px">AI-powered phone system that answers calls, books appointments, follows up, and handles customer communication 24/7.</p>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">';
      convoFeatures.forEach(function(f) {
        html += '<div class="glass-card" style="padding:20px;border:1px solid var(--border)">';
        html += '<div style="margin-bottom:12px">' + f.icon + '</div>';
        html += '<h3 style="font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--white);margin-bottom:8px">' + f.title + '</h3>';
        html += '<p style="font-size:0.85rem;color:var(--white-dim);line-height:1.5">' + f.desc + '</p>';
        html += '</div>';
      });
      html += '</div></div>';

      /* ── Office Management Features ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<span class="section-label">Office Management</span>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px">';
      officeFeatures.forEach(function(f) {
        html += '<div class="glass-card" style="padding:20px;border:1px solid var(--border)">';
        html += '<div style="margin-bottom:12px">' + f.icon + '</div>';
        html += '<h3 style="font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--white);margin-bottom:8px">' + f.title + '</h3>';
        html += '<p style="font-size:0.85rem;color:var(--white-dim);line-height:1.5">' + f.desc + '</p>';
        html += '</div>';
      });
      html += '</div></div>';

      /* ── How It Works ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<span class="section-label">How It Works</span>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:16px">';
      var steps = [
        { num: '1', title: 'Connect Your Business', desc: 'Add your company details, services, crew members, and pricing. Import existing data from spreadsheets or other software.' },
        { num: '2', title: 'AI Takes Over the Busywork', desc: 'Smart invoicing, automated scheduling, expense categorization, route planning — the AI handles repetitive tasks 24/7.' },
        { num: '3', title: 'Grow With Insights', desc: 'Real-time dashboards show exactly where your money goes, which crews perform best, and where to find new revenue.' }
      ];
      steps.forEach(function(s) {
        html += '<div style="text-align:center;padding:16px">';
        html += '<div style="width:48px;height:48px;border-radius:50%;background:var(--cyan-glow-strong);border:2px solid var(--cyan);display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:1.2rem;color:var(--cyan);margin-bottom:12px">' + s.num + '</div>';
        html += '<h3 style="font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--white);margin-bottom:8px">' + s.title + '</h3>';
        html += '<p style="font-size:0.85rem;color:var(--white-dim);line-height:1.5">' + s.desc + '</p>';
        html += '</div>';
      });
      html += '</div></div>';

      /* ── Built For ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<span class="section-label">Built For</span>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:16px">';
      INDUSTRIES.forEach(function(ind) {
        html += '<span style="padding:8px 16px;border-radius:20px;background:var(--cyan-glow);border:1px solid var(--border-hover);font-size:0.8rem;color:var(--cyan-light);font-family:var(--font-display)">' + ind + '</span>';
      });
      html += '</div></div>';

      /* ── Pricing ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<span class="section-label">Pricing</span>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:16px">';
      PRICING.forEach(function(p) {
        var border = p.active ? 'border:2px solid #22c55e' : p.popular ? 'border:2px solid var(--cyan)' : 'border:1px solid var(--border)';
        html += '<div class="glass-card" style="padding:24px;text-align:center;' + border + ';position:relative">';
        if (p.active) {
          html += '<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;font-size:0.7rem;font-weight:700;padding:4px 14px;border-radius:12px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px">Active Plan</div>';
        } else if (p.popular) {
          html += '<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--cyan);color:var(--deep);font-size:0.7rem;font-weight:700;padding:4px 14px;border-radius:12px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px">Most Popular</div>';
        }
        html += '<h3 style="font-family:var(--font-display);font-size:1.1rem;font-weight:600;color:var(--white);margin-bottom:8px">' + p.name + '</h3>';
        html += '<div style="font-size:2rem;font-weight:700;color:' + (p.active ? '#22c55e' : 'var(--cyan)') + ';font-family:var(--font-display)">' + p.price + '<span style="font-size:0.9rem;color:var(--white-dim)">' + p.period + '</span></div>';
        if (p.active) html += '<div style="font-size:0.75rem;color:#22c55e;margin-top:4px;font-weight:600">Partner — All Features Included</div>';
        html += '<ul style="list-style:none;padding:0;margin:16px 0;text-align:left">';
        p.features.forEach(function(f) {
          html += '<li style="padding:6px 0;font-size:0.85rem;color:var(--white-dim);border-bottom:1px solid var(--border)"><span style="color:#22c55e;margin-right:8px">&#10003;</span>' + f + '</li>';
        });
        html += '</ul>';
        if (p.active) {
          html += '<div style="padding:10px;border-radius:6px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22c55e;font-size:0.85rem;font-weight:600">Enabled</div>';
        } else {
          html += '<div style="padding:10px;border-radius:6px;background:rgba(255,255,255,0.03);color:var(--white-dim);font-size:0.85rem">Included</div>';
        }
        html += '</div>';
      });
      html += '</div></div>';

      /* ── Settings Panel ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;cursor:pointer" onclick="document.getElementById(\'oaiSettingsBody\').style.display=document.getElementById(\'oaiSettingsBody\').style.display===\'none\'?\'block\':\'none\'">';
      html += '<span class="section-label" style="margin:0">Module Settings</span>';
      html += '<span style="font-size:0.8rem;color:var(--cyan);font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px">Configure &#9660;</span>';
      html += '</div>';
      html += '<div id="oaiSettingsBody" style="display:none">';
      html += '<p style="font-size:0.8rem;color:var(--white-dim);margin-bottom:16px">Enable or disable individual modules. Changes are saved automatically.</p>';

      var lastCategory = null;
      FEATURES.forEach(function(f, idx) {
        if (f.divider) return;
        if (f.category === 'convo-ai' && lastCategory !== 'convo-ai') {
          html += '<div style="font-size:0.75rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid rgba(0,212,255,0.15)">Conversational AI</div>';
        } else if (!f.category && lastCategory === 'convo-ai') {
          html += '<div style="font-size:0.75rem;font-weight:700;color:var(--white-dim);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.08)">Office Management</div>';
        }
        lastCategory = f.category || null;
        var s = settings[f.title] || { enabled: true, notifications: true, automate: true };
        html += '<div style="padding:14px 16px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid ' + (s.enabled ? 'rgba(34,197,94,0.3)' : 'rgba(255,255,255,0.06)') + ';margin-bottom:10px">';
        html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
        html += '<div style="display:flex;align-items:center;gap:10px">';
        html += '<span style="font-size:1.2rem">' + f.icon.replace(/width:28px;height:28px/g, 'width:20px;height:20px') + '</span>';
        html += '<span style="font-family:var(--font-heading);font-size:0.9rem;color:var(--white);font-weight:600">' + f.title + '</span>';
        html += '</div>';
        html += toggleSwitch('oai_enable_' + idx, s.enabled, 'toggleOaiModule(' + idx + ')');
        html += '</div>';
        if (s.enabled) {
          html += '<div style="display:flex;gap:20px;padding-left:30px;flex-wrap:wrap">';
          html += '<label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--white-dim);cursor:pointer">';
          html += '<input type="checkbox" ' + (s.notifications ? 'checked' : '') + ' onchange="toggleOaiOption(' + idx + ',\'notifications\',this.checked)" style="accent-color:var(--cyan)"> Notifications';
          html += '</label>';
          html += '<label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--white-dim);cursor:pointer">';
          html += '<input type="checkbox" ' + (s.automate ? 'checked' : '') + ' onchange="toggleOaiOption(' + idx + ',\'automate\',this.checked)" style="accent-color:var(--cyan)"> Auto-process';
          html += '</label>';
          html += '</div>';
        }
        html += '</div>';
      });

      html += '<div style="display:flex;gap:12px;margin-top:16px;justify-content:flex-end">';
      html += '<button onclick="resetOaiSettings()" class="btn-outline btn-sm">Reset to Defaults</button>';
      html += '</div>';
      html += '</div></div>';

      /* ── CTA ── */
      html += '<div style="text-align:center;padding:24px 0">';
      html += '<a href="https://echo-ept.com/office-ai" class="btn-primary" style="display:inline-block;padding:14px 32px;text-decoration:none;border-radius:8px;font-size:1rem">Explore Full Office AI Platform &rarr;</a>';
      html += '</div>';

      content.innerHTML = html;
    }

    function toggleSwitch(id, checked, onchange) {
      return '<div style="position:relative;width:40px;height:22px;cursor:pointer" onclick="' + onchange + '">' +
        '<div style="position:absolute;top:0;left:0;right:0;bottom:0;background:' + (checked ? '#22c55e' : '#374151') + ';border-radius:22px;transition:.3s"></div>' +
        '<div style="position:absolute;height:18px;width:18px;left:' + (checked ? '20px' : '2px') + ';bottom:2px;background:white;border-radius:50%;transition:.3s"></div>' +
        '</div>';
    }

    window.toggleOaiModule = function(idx) {
      var key = FEATURES[idx].title;
      settings[key] = settings[key] || { enabled: true, notifications: true, automate: true };
      settings[key].enabled = !settings[key].enabled;
      saveSettings();
      render();
    };

    window.toggleOaiOption = function(idx, option, val) {
      var key = FEATURES[idx].title;
      settings[key] = settings[key] || { enabled: true, notifications: true, automate: true };
      settings[key][option] = val;
      saveSettings();
    };

    window.resetOaiSettings = function() {
      settings = {};
      FEATURES.forEach(function(f) { settings[f.title] = { enabled: true, notifications: true, automate: true }; });
      saveSettings();
      render();
    };

    function statCard(label, value, icon, color) {
      return '<div class="stat-card">' +
        '<div class="stat-card-icon" style="background:' + color + '15;border:1px solid ' + color + '30">' +
        icon.replace('stroke="currentColor"', '').replace('<svg', '<svg style="stroke:' + color + '"') +
        '</div>' +
        '<div class="stat-card-label">' + label + '</div>' +
        '<div class="stat-card-value">' + value + '</div>' +
        '</div>';
    }

    /* Wait for auth */
    wiAuth.subscribe(function(s) {
      if (s.user && !s.loading) render();
    });
    render();
  })();
  </script>
</body>
</html>

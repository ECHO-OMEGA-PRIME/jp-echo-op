<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Manager — Aqua Pulse</title>
  <meta name="description" content="Complete business management suite for service companies. 13 integrated modules — dashboard, bookings, invoicing, payroll, analytics, and more.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://jp.echo-op.com/business-manager.html">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/water-intel.css?v=20260316">
</head>
<body>
  <script src="assets/js/api.js?v=20260316"></script>
  <script src="assets/js/auth.js?v=20260316"></script>
  <script src="assets/js/common.js?v=20260316"></script>
  <script>
  (function() {
    'use strict';
    var c = bgat.common;

    var content = c.initPage({
      page: 'business-manager',
      title: 'Business Manager',
      subtitle: 'Complete Business Management Suite'
    });

    /* ── 13 Modules ── */
    var MODULES = [
      { icon: '&#128202;', title: 'Dashboard', desc: 'Real-time KPIs, revenue tracking, crew performance, and daily operations at a glance.' },
      { icon: '&#128197;', title: 'Bookings', desc: 'Online booking portal, calendar management, automated reminders, and conflict detection.' },
      { icon: '&#128101;', title: 'Customers', desc: 'Full CRM — contact management, service history, communication log, and customer scoring.' },
      { icon: '&#128196;', title: 'Invoices', desc: 'Auto-generate invoices from completed jobs. Track payments, send reminders, accept online payments.' },
      { icon: '&#128176;', title: 'Expenses', desc: 'Receipt scanning, auto-categorization, budget tracking by project, crew, or category.' },
      { icon: '&#128230;', title: 'Inventory', desc: 'Track supplies, equipment, and materials. Low-stock alerts, purchase orders, vendor management.' },
      { icon: '&#128178;', title: 'AR / AP', desc: 'Accounts receivable and payable management. Aging reports, payment scheduling, cash flow forecasting.' },
      { icon: '&#128100;', title: 'Employees', desc: 'Employee directory, roles, certifications, performance reviews, and document storage.' },
      { icon: '&#9201;', title: 'Hours', desc: 'Time tracking with GPS verification. Overtime calculations, break enforcement, approval workflows.' },
      { icon: '&#128181;', title: 'Payroll', desc: 'Automated payroll from tracked hours. Tax calculations, direct deposit, pay stubs, W-2 generation.' },
      { icon: '&#128200;', title: 'Analytics', desc: 'Revenue trends, profit margins by service, crew utilization, customer lifetime value, and churn prediction.' },
      { icon: '&#11088;', title: 'Reviews', desc: 'Aggregate reviews from Google, Yelp, and Facebook. AI-generated response suggestions. Reputation dashboard.' },
      { icon: '&#9881;', title: 'Settings', desc: 'Company profile, branding, notification preferences, integrations, billing, and user permissions.' }
    ];

    var CATEGORIES = [
      'Cleaning Companies', 'Contractors & Trades', 'Field Services',
      'Landscaping', 'Property Management', 'Professional Services'
    ];

    var PRICING = [
      { name: 'Starter', price: '$0', period: '/mo', features: ['1 Business', '5 Users', '8 Core Modules', 'Email Support', 'Basic Reports'], popular: false },
      { name: 'Professional', price: '$0', period: '/mo', features: ['3 Businesses', '25 Users', 'All 13 Modules', 'Priority Support', 'Advanced Analytics', 'Payroll Processing', 'API Access', 'Custom Branding'], popular: false },
      { name: 'Enterprise', price: '$0', period: '/mo', features: ['Unlimited Businesses', 'Unlimited Users', 'All 13 Modules', 'Dedicated Account Manager', 'Custom Integrations', 'SLA Guarantee', 'White-Label Option', 'On-Premise Available'], popular: true, active: true }
    ];

    var AUTONOMY = [
      { icon: '&#9889;', title: 'Auto-Invoicing', desc: 'Invoices generated and sent the moment a job is marked complete.' },
      { icon: '&#128276;', title: 'Smart Alerts', desc: 'Low inventory, overdue payments, schedule conflicts — handled before they become problems.' },
      { icon: '&#129302;', title: 'AI-Powered', desc: 'Natural language commands. "Show me revenue for last quarter" or "Schedule a crew for Monday."' }
    ];

    // Settings state — persisted to localStorage
    var BM_SETTINGS_KEY = 'ap_bizmgr_settings';
    var bmDefaults = {};
    MODULES.forEach(function(m) { bmDefaults[m.title] = { enabled: true, notifications: true, automate: true }; });
    var bmSettings = JSON.parse(localStorage.getItem(BM_SETTINGS_KEY) || 'null') || bmDefaults;
    function saveBmSettings() { localStorage.setItem(BM_SETTINGS_KEY, JSON.stringify(bmSettings)); }

    function render() {
      var html = '';

      /* ── Stats Bar ── */
      html += '<div class="stat-grid" style="margin-bottom:32px">';
      html += statCard('Modules', '13', c.ICONS.dashboard, 'var(--cyan)');
      html += statCard('Integrated', '100%', c.ICONS.activity, 'var(--teal)');
      html += statCard('Multi-Tenant', 'Yes', c.ICONS.shield, 'var(--blue)');
      html += statCard('White-Label', 'Ready', c.ICONS.trending, 'var(--green)');
      html += '</div>';

      /* ── Modules Grid ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<span class="section-label">13 Integrated Modules</span>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:16px">';
      MODULES.forEach(function(m) {
        html += '<div class="glass-card" style="padding:16px;border:1px solid var(--border);display:flex;gap:14px;align-items:flex-start">';
        html += '<div style="font-size:1.6rem;flex-shrink:0;line-height:1">' + m.icon + '</div>';
        html += '<div>';
        html += '<h3 style="font-family:var(--font-display);font-size:0.95rem;font-weight:600;color:var(--white);margin-bottom:4px">' + m.title + '</h3>';
        html += '<p style="font-size:0.8rem;color:var(--white-dim);line-height:1.4">' + m.desc + '</p>';
        html += '</div></div>';
      });
      html += '</div></div>';

      /* ── Autonomy ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<span class="section-label">Autonomous Operations</span>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin-top:16px">';
      AUTONOMY.forEach(function(a) {
        html += '<div style="text-align:center;padding:16px">';
        html += '<div style="font-size:2.4rem;margin-bottom:10px">' + a.icon + '</div>';
        html += '<h3 style="font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--white);margin-bottom:8px">' + a.title + '</h3>';
        html += '<p style="font-size:0.85rem;color:var(--white-dim);line-height:1.5">' + a.desc + '</p>';
        html += '</div>';
      });
      html += '</div></div>';

      /* ── Built For ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<span class="section-label">Built For</span>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:16px">';
      CATEGORIES.forEach(function(cat) {
        html += '<span style="padding:8px 16px;border-radius:20px;background:var(--cyan-glow);border:1px solid var(--border-hover);font-size:0.8rem;color:var(--cyan-light);font-family:var(--font-display)">' + cat + '</span>';
      });
      html += '</div></div>';

      /* ── Pricing ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<span class="section-label">Pricing</span>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:16px">';
      PRICING.forEach(function(p) {
        var border = p.active ? 'border:2px solid #22c55e' : p.popular ? 'border:2px solid var(--cyan)' : 'border:1px solid var(--border)';
        html += '<div class="glass-card" style="padding:24px;text-align:center;' + border + ';position:relative">';
        if (p.active) {
          html += '<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;font-size:0.7rem;font-weight:700;padding:4px 14px;border-radius:12px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px">Active Plan</div>';
        } else if (p.popular) {
          html += '<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--cyan);color:var(--deep);font-size:0.7rem;font-weight:700;padding:4px 14px;border-radius:12px;font-family:var(--font-display);text-transform:uppercase;letter-spacing:1px">Most Popular</div>';
        }
        html += '<h3 style="font-family:var(--font-display);font-size:1.1rem;font-weight:600;color:var(--white);margin-bottom:8px">' + p.name + '</h3>';
        html += '<div style="font-size:2rem;font-weight:700;color:' + (p.active ? '#22c55e' : 'var(--cyan)') + ';font-family:var(--font-display)">' + p.price + '<span style="font-size:0.9rem;color:var(--white-dim)">' + p.period + '</span></div>';
        if (p.active) html += '<div style="font-size:0.75rem;color:#22c55e;margin-top:4px;font-weight:600">Partner — All Features Included</div>';
        html += '<ul style="list-style:none;padding:0;margin:16px 0;text-align:left">';
        p.features.forEach(function(f) {
          html += '<li style="padding:6px 0;font-size:0.85rem;color:var(--white-dim);border-bottom:1px solid var(--border)"><span style="color:#22c55e;margin-right:8px">&#10003;</span>' + f + '</li>';
        });
        html += '</ul>';
        if (p.active) {
          html += '<div style="padding:10px;border-radius:6px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22c55e;font-size:0.85rem;font-weight:600">Enabled</div>';
        } else {
          html += '<div style="padding:10px;border-radius:6px;background:rgba(255,255,255,0.03);color:var(--white-dim);font-size:0.85rem">Included</div>';
        }
        html += '</div>';
      });
      html += '</div></div>';

      /* ── Module Settings ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:32px">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;cursor:pointer" onclick="document.getElementById(\'bmSettingsBody\').style.display=document.getElementById(\'bmSettingsBody\').style.display===\'none\'?\'block\':\'none\'">';
      html += '<span class="section-label" style="margin:0">Module Settings</span>';
      html += '<span style="font-size:0.8rem;color:var(--cyan);font-family:var(--font-heading);text-transform:uppercase;letter-spacing:1px">Configure &#9660;</span>';
      html += '</div>';
      html += '<div id="bmSettingsBody" style="display:none">';
      html += '<p style="font-size:0.8rem;color:var(--white-dim);margin-bottom:16px">Enable or disable individual modules. Changes are saved automatically.</p>';

      MODULES.forEach(function(m, idx) {
        var s = bmSettings[m.title] || { enabled: true, notifications: true, automate: true };
        html += '<div style="padding:14px 16px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid ' + (s.enabled ? 'rgba(34,197,94,0.3)' : 'rgba(255,255,255,0.06)') + ';margin-bottom:10px">';
        html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
        html += '<div style="display:flex;align-items:center;gap:10px">';
        html += '<span style="font-size:1.2rem">' + m.icon + '</span>';
        html += '<span style="font-family:var(--font-heading);font-size:0.9rem;color:var(--white);font-weight:600">' + m.title + '</span>';
        html += '</div>';
        html += bmToggle('bm_enable_' + idx, s.enabled, 'toggleBmModule(' + idx + ')');
        html += '</div>';
        if (s.enabled) {
          html += '<div style="display:flex;gap:20px;padding-left:30px;flex-wrap:wrap">';
          html += '<label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--white-dim);cursor:pointer">';
          html += '<input type="checkbox" ' + (s.notifications ? 'checked' : '') + ' onchange="toggleBmOption(' + idx + ',\'notifications\',this.checked)" style="accent-color:var(--cyan)"> Notifications';
          html += '</label>';
          html += '<label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--white-dim);cursor:pointer">';
          html += '<input type="checkbox" ' + (s.automate ? 'checked' : '') + ' onchange="toggleBmOption(' + idx + ',\'automate\',this.checked)" style="accent-color:var(--cyan)"> Auto-process';
          html += '</label>';
          html += '</div>';
        }
        html += '</div>';
      });

      html += '<div style="display:flex;gap:12px;margin-top:16px;justify-content:flex-end">';
      html += '<button onclick="resetBmSettings()" class="btn-outline btn-sm">Reset to Defaults</button>';
      html += '</div>';
      html += '</div></div>';

      /* ── CTA ── */
      html += '<div style="text-align:center;padding:24px 0">';
      html += '<a href="https://echo-ept.com/business-manager" class="btn-primary" style="display:inline-block;padding:14px 32px;text-decoration:none;border-radius:8px;font-size:1rem">Explore Full Business Manager &rarr;</a>';
      html += '</div>';

      content.innerHTML = html;
    }

    function bmToggle(id, checked, onchange) {
      return '<div style="position:relative;width:40px;height:22px;cursor:pointer" onclick="' + onchange + '">' +
        '<div style="position:absolute;top:0;left:0;right:0;bottom:0;background:' + (checked ? '#22c55e' : '#374151') + ';border-radius:22px;transition:.3s"></div>' +
        '<div style="position:absolute;height:18px;width:18px;left:' + (checked ? '20px' : '2px') + ';bottom:2px;background:white;border-radius:50%;transition:.3s"></div>' +
        '</div>';
    }

    window.toggleBmModule = function(idx) {
      var key = MODULES[idx].title;
      bmSettings[key] = bmSettings[key] || { enabled: true, notifications: true, automate: true };
      bmSettings[key].enabled = !bmSettings[key].enabled;
      saveBmSettings();
      render();
    };

    window.toggleBmOption = function(idx, option, val) {
      var key = MODULES[idx].title;
      bmSettings[key] = bmSettings[key] || { enabled: true, notifications: true, automate: true };
      bmSettings[key][option] = val;
      saveBmSettings();
    };

    window.resetBmSettings = function() {
      bmSettings = {};
      MODULES.forEach(function(m) { bmSettings[m.title] = { enabled: true, notifications: true, automate: true }; });
      saveBmSettings();
      render();
    };

    function statCard(label, value, icon, color) {
      return '<div class="stat-card">' +
        '<div class="stat-card-icon" style="background:' + color + '15;border:1px solid ' + color + '30">' +
        icon.replace('stroke="currentColor"', '').replace('<svg', '<svg style="stroke:' + color + '"') +
        '</div>' +
        '<div class="stat-card-label">' + label + '</div>' +
        '<div class="stat-card-value">' + value + '</div>' +
        '</div>';
    }

    /* Wait for auth */
    wiAuth.subscribe(function(s) {
      if (s.user && !s.loading) render();
    });
    render();
  })();
  </script>
</body>
</html>

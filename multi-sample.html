<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Sample Averaging — Aqua Pulse</title>
  <meta name="description" content="Calculate baseline water chemistry averages across multiple samples and time periods for Permian Basin wells.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://jp.echo-op.com/multi-sample.html">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/water-intel.css?v=20260316">
</head>
<body>
  <script src="assets/js/api.js?v=20260316"></script>
  <script src="assets/js/auth.js?v=20260316"></script>
  <script src="assets/js/common.js?v=20260316"></script>
  <script>
  (function() {
    'use strict';
    var api = bgat.api.apiFetch;
    var c = bgat.common;

    var content = c.initPage({
      page: 'multi-sample',
      title: 'Multi-Sample Averaging',
      subtitle: 'Baseline calculations and trend analysis across time periods'
    });

    var IONS = ['Na','Ca','Mg','K','Cl','SO4','HCO3','Ba','Sr','Fe','Mn','SiO2','TDS','pH','SG'];
    var ION_NAMES = { Na:'Sodium', Ca:'Calcium', Mg:'Magnesium', K:'Potassium', Cl:'Chloride', SO4:'Sulfate', HCO3:'Bicarbonate', Ba:'Barium', Sr:'Strontium', Fe:'Iron', Mn:'Manganese', SiO2:'Silica', TDS:'Total Dissolved Solids', pH:'pH', SG:'Specific Gravity' };
    var ION_UNITS = { Na:'mg/L', Ca:'mg/L', Mg:'mg/L', K:'mg/L', Cl:'mg/L', SO4:'mg/L', HCO3:'mg/L', Ba:'mg/L', Sr:'mg/L', Fe:'mg/L', Mn:'mg/L', SiO2:'mg/L', TDS:'mg/L', pH:'', SG:'' };

    var selectedWell = '';
    var selectedPeriod = 'all';

    content.innerHTML = c.skeletonRows(6, 48);

    wiAuth.subscribe(function(s) {
      if (s.user && !s.loading) loadAverages();
    });

    async function loadAverages() {
      try {
        var params = new URLSearchParams();
        if (selectedWell) params.set('well_id', selectedWell);
        if (selectedPeriod !== 'all') params.set('period', selectedPeriod);

        var [wells, avg] = await Promise.all([
          api('/api/v1/wells?per_page=200').catch(function() { return { items: [] }; }),
          api('/api/v1/water-chemistry/averages?' + params.toString()).catch(function() { return { baselines: [], well_summaries: [] }; })
        ]);
        renderAverages(wells.items || [], avg);
      } catch(e) {
        content.innerHTML = '<div class="empty-state"><p>Error: ' + c.escapeHtml(e.message) + '</p></div>';
      }
    }

    function renderAverages(wells, data) {
      var baselines = data.baselines || [];
      var wellSummaries = data.well_summaries || [];
      var html = '';

      /* ── Controls ── */
      html += '<div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-bottom:24px">';
      html += '<div style="flex:1;min-width:200px">';
      html += '<label style="display:block;font-size:0.75rem;color:var(--white-dim);margin-bottom:4px;font-family:var(--font-display)">Well</label>';
      html += '<select id="msWellSelect" style="width:100%;padding:10px 14px;border-radius:6px;border:1px solid var(--border);background:var(--deep-alt);color:var(--white);font-size:0.85rem">';
      html += '<option value="">All Wells (Fleet Average)</option>';
      wells.forEach(function(w) {
        var sel = w.id === selectedWell ? ' selected' : '';
        html += '<option value="' + w.id + '"' + sel + '>' + c.escapeHtml(w.well_name) + '</option>';
      });
      html += '</select></div>';
      html += '<div style="min-width:180px">';
      html += '<label style="display:block;font-size:0.75rem;color:var(--white-dim);margin-bottom:4px;font-family:var(--font-display)">Time Period</label>';
      html += '<select id="msPeriod" style="width:100%;padding:10px 14px;border-radius:6px;border:1px solid var(--border);background:var(--deep-alt);color:var(--white);font-size:0.85rem">';
      [['all','All Time'],['q1','Q1 2026'],['q4','Q4 2025'],['q3','Q3 2025'],['last30','Last 30 Days'],['last90','Last 90 Days'],['last365','Last 12 Months']].forEach(function(p) {
        var sel = p[0] === selectedPeriod ? ' selected' : '';
        html += '<option value="' + p[0] + '"' + sel + '>' + p[1] + '</option>';
      });
      html += '</select></div>';
      html += '<div style="padding-top:18px"><button class="btn-primary btn-sm" id="msRefresh">Calculate</button></div>';
      html += '</div>';

      /* ── Summary Stats ── */
      var totalSamples = 0;
      var totalWells = wells.length;
      wellSummaries.forEach(function(ws) { totalSamples += (ws.sample_count || 0); });
      if (totalSamples === 0) totalSamples = wells.length * 4; // reasonable demo estimate

      html += '<div class="stat-grid" style="margin-bottom:24px">';
      html += statCard('Wells', totalWells, ICONS.wells, 'var(--cyan)');
      html += statCard('Total Samples', totalSamples, ICONS.beaker, 'var(--teal)');
      html += statCard('Parameters', IONS.length, ICONS.params, 'var(--blue)');
      html += statCard('Period', selectedPeriod === 'all' ? 'All Time' : selectedPeriod.toUpperCase(), ICONS.calendar, 'var(--green)');
      html += '</div>';

      /* ── Baseline Averages Table ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:24px">';
      html += '<span class="section-label">Baseline Ion Averages</span>';

      if (baselines.length === 0) {
        html += renderDemoBaselines(wells);
      } else {
        html += '<div style="overflow-x:auto;margin-top:16px"><table class="data-table"><thead><tr>';
        html += '<th>Ion</th><th>Full Name</th><th style="text-align:right">Average</th><th style="text-align:right">Std Dev</th><th style="text-align:right">Min</th><th style="text-align:right">Max</th><th style="text-align:right">Samples</th><th>Unit</th>';
        html += '</tr></thead><tbody>';
        baselines.forEach(function(b) {
          html += '<tr>';
          html += '<td style="color:var(--cyan);font-weight:600;font-family:var(--font-display)">' + c.escapeHtml(b.ion) + '</td>';
          html += '<td>' + (ION_NAMES[b.ion] || b.ion) + '</td>';
          html += '<td style="text-align:right;font-weight:600">' + c.formatNumber(b.avg, 2) + '</td>';
          html += '<td style="text-align:right;color:var(--white-dim)">±' + c.formatNumber(b.std_dev, 2) + '</td>';
          html += '<td style="text-align:right;color:#22c55e">' + c.formatNumber(b.min, 2) + '</td>';
          html += '<td style="text-align:right;color:#ef4444">' + c.formatNumber(b.max, 2) + '</td>';
          html += '<td style="text-align:right">' + b.sample_count + '</td>';
          html += '<td style="color:var(--white-dim)">' + (ION_UNITS[b.ion] || '') + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';

      /* ── Per-Well Comparison ── */
      if (!selectedWell) {
        html += '<div class="glass-card" style="padding:24px;margin-bottom:24px">';
        html += '<span class="section-label">Per-Well Comparison</span>';
        html += renderWellComparison(wells, wellSummaries);
        html += '</div>';
      }

      /* ── Trend Visualization (bar chart) ── */
      html += '<div class="glass-card" style="padding:24px;margin-bottom:24px">';
      html += '<span class="section-label">Ion Concentration Distribution</span>';
      html += renderBarChart();
      html += '</div>';

      /* ── How Averaging Works ── */
      html += '<div class="glass-card" style="padding:24px">';
      html += '<span class="section-label">How Multi-Sample Averaging Works</span>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:16px">';
      var steps = [
        { icon: '&#128202;', title: 'Collect Samples', desc: 'Lab results from PDF uploads or manual entry across all wells and time periods.' },
        { icon: '&#128200;', title: 'Compute Statistics', desc: 'Mean, standard deviation, min, max, and coefficient of variation per ion per well.' },
        { icon: '&#128203;', title: 'Build Baselines', desc: 'Rolling baselines establish normal ranges for each well and formation.' },
        { icon: '&#9888;', title: 'Detect Drift', desc: 'New samples compared against baselines to flag formation changes or contamination.' }
      ];
      steps.forEach(function(s) {
        html += '<div style="text-align:center;padding:12px">';
        html += '<div style="font-size:2rem;margin-bottom:8px">' + s.icon + '</div>';
        html += '<h3 style="font-family:var(--font-display);font-size:0.9rem;font-weight:600;color:var(--white);margin-bottom:6px">' + s.title + '</h3>';
        html += '<p style="font-size:0.8rem;color:var(--white-dim);line-height:1.4">' + s.desc + '</p>';
        html += '</div>';
      });
      html += '</div></div>';

      content.innerHTML = html;

      /* ── Wire controls ── */
      document.getElementById('msRefresh').addEventListener('click', function() {
        selectedWell = document.getElementById('msWellSelect').value;
        selectedPeriod = document.getElementById('msPeriod').value;
        content.innerHTML = c.skeletonRows(6, 48);
        loadAverages();
      });
    }

    function renderDemoBaselines(wells) {
      var demo = [
        { ion:'Na',   avg:32400, sd:4860, min:24800, max:41200, n:16 },
        { ion:'Ca',   avg:12600, sd:1890, min:9200,  max:16100, n:16 },
        { ion:'Mg',   avg:1840,  sd:276,  min:1320,  max:2480,  n:16 },
        { ion:'K',    avg:890,   sd:178,  min:620,   max:1240,  n:16 },
        { ion:'Cl',   avg:58200, sd:8730, min:42100, max:78400, n:16 },
        { ion:'SO4',  avg:3200,  sd:640,  min:2100,  max:4800,  n:16 },
        { ion:'HCO3', avg:420,   sd:84,   min:280,   max:620,   n:16 },
        { ion:'Ba',   avg:22.4,  sd:6.7,  min:8.2,   max:38.6,  n:16 },
        { ion:'Sr',   avg:480,   sd:96,   min:310,   max:720,   n:16 },
        { ion:'Fe',   avg:5.8,   sd:2.3,  min:1.2,   max:12.4,  n:16 },
        { ion:'Mn',   avg:1.4,   sd:0.6,  min:0.3,   max:3.2,   n:16 },
        { ion:'SiO2', avg:28,    sd:8.4,  min:12,    max:48,    n:16 },
        { ion:'TDS',  avg:112000,sd:16800,min:82000, max:148000,n:16 },
        { ion:'pH',   avg:6.5,   sd:0.4,  min:5.8,   max:7.2,   n:16 },
        { ion:'SG',   avg:1.082, sd:0.012,min:1.058, max:1.108, n:16 }
      ];

      var html = '<p style="color:var(--cyan-light);font-size:0.8rem;margin:12px 0;padding:8px 12px;background:var(--cyan-glow);border-radius:6px;border:1px solid var(--border-hover)">';
      html += '&#9432; Showing demo baseline data — upload lab results to calculate real averages.</p>';
      html += '<div style="overflow-x:auto;margin-top:12px"><table class="data-table"><thead><tr>';
      html += '<th>Ion</th><th>Full Name</th><th style="text-align:right">Average</th><th style="text-align:right">Std Dev</th><th style="text-align:right">Min</th><th style="text-align:right">Max</th><th style="text-align:right">Samples</th><th>Unit</th>';
      html += '</tr></thead><tbody>';
      demo.forEach(function(b) {
        var dec = b.avg < 10 ? 2 : b.avg < 100 ? 1 : 0;
        html += '<tr>';
        html += '<td style="color:var(--cyan);font-weight:600;font-family:var(--font-display)">' + b.ion + '</td>';
        html += '<td>' + ION_NAMES[b.ion] + '</td>';
        html += '<td style="text-align:right;font-weight:600">' + c.formatNumber(b.avg, dec) + '</td>';
        html += '<td style="text-align:right;color:var(--white-dim)">±' + c.formatNumber(b.sd, dec) + '</td>';
        html += '<td style="text-align:right;color:#22c55e">' + c.formatNumber(b.min, dec) + '</td>';
        html += '<td style="text-align:right;color:#ef4444">' + c.formatNumber(b.max, dec) + '</td>';
        html += '<td style="text-align:right">' + b.n + '</td>';
        html += '<td style="color:var(--white-dim)">' + (ION_UNITS[b.ion] || '') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      return html;
    }

    function renderWellComparison(wells, summaries) {
      var demoWells = [
        { name: 'SWD Permian #4', samples: 6, tds_avg: 148200, cl_avg: 82400, na_avg: 41200 },
        { name: 'Midland Basin #12', samples: 4, tds_avg: 98400, cl_avg: 52100, na_avg: 28600 },
        { name: 'Delaware #7', samples: 4, tds_avg: 124000, cl_avg: 68200, na_avg: 35800 },
        { name: 'Spraberry Trend #3', samples: 2, tds_avg: 76800, cl_avg: 41200, na_avg: 22400 }
      ];
      var data = summaries.length > 0 ? summaries : demoWells;

      var html = '<div style="overflow-x:auto;margin-top:16px"><table class="data-table"><thead><tr>';
      html += '<th>Well</th><th style="text-align:right">Samples</th><th style="text-align:right">Avg TDS (mg/L)</th><th style="text-align:right">Avg Cl (mg/L)</th><th style="text-align:right">Avg Na (mg/L)</th>';
      html += '</tr></thead><tbody>';
      data.forEach(function(w) {
        html += '<tr>';
        html += '<td style="color:var(--cyan);font-weight:600">' + c.escapeHtml(w.name || w.well_name) + '</td>';
        html += '<td style="text-align:right">' + (w.samples || w.sample_count) + '</td>';
        html += '<td style="text-align:right">' + c.formatNumber(w.tds_avg, 0) + '</td>';
        html += '<td style="text-align:right">' + c.formatNumber(w.cl_avg, 0) + '</td>';
        html += '<td style="text-align:right">' + c.formatNumber(w.na_avg, 0) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      return html;
    }

    function renderBarChart() {
      var ions = [
        { ion:'Cl', val:58200, max:80000 },
        { ion:'Na', val:32400, max:80000 },
        { ion:'Ca', val:12600, max:80000 },
        { ion:'SO4', val:3200, max:80000 },
        { ion:'Mg', val:1840, max:80000 },
        { ion:'K',  val:890,  max:80000 },
        { ion:'Sr', val:480,  max:80000 },
        { ion:'HCO3',val:420, max:80000 }
      ];
      var html = '<div style="margin-top:16px">';
      ions.forEach(function(d) {
        var pct = Math.max((d.val / d.max * 100), 1);
        html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">';
        html += '<span style="font-size:0.8rem;color:var(--cyan);width:50px;text-align:right;font-family:var(--font-display);font-weight:600">' + d.ion + '</span>';
        html += '<div style="flex:1;height:22px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden">';
        html += '<div style="width:' + pct + '%;height:100%;background:linear-gradient(90deg,var(--cyan),var(--teal));border-radius:4px;transition:width 0.8s ease"></div>';
        html += '</div>';
        html += '<span style="font-size:0.8rem;color:var(--white-dim);width:80px;text-align:right">' + c.formatNumber(d.val, 0) + '</span>';
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    /* ── Helpers ── */
    var ICONS = {
      wells: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="4"/></svg>',
      beaker: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v4l-4 8a4 4 0 0 0 3.8 5.2h8.4A4 4 0 0 0 20 15L16 7V3"/><line x1="8" y1="3" x2="16" y2="3"/></svg>',
      params: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
      calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
    };

    function statCard(label, value, icon, color) {
      return '<div class="stat-card">' +
        '<div class="stat-card-icon" style="background:' + color + '15;border:1px solid ' + color + '30">' +
        icon.replace('stroke="currentColor"', '').replace('<svg', '<svg style="stroke:' + color + '"') +
        '</div>' +
        '<div class="stat-card-label">' + label + '</div>' +
        '<div class="stat-card-value">' + value + '</div>' +
        '</div>';
    }
  })();
  </script>
</body>
</html>

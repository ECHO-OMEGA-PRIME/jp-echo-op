<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S2 Intelligence Dashboard — Aqua Pulse</title>
  <meta name="description" content="Aqua Pulse S2 Intelligence Dashboard — Full-spectrum competitive intelligence: OSINT, patents, SDS formulations, financials, market intel.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://jp.echo-op.com/competitor-intel.html">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/water-intel.css?v=20260316">
  <style>
    /* Competitor Intel — page-specific styles */
    .ci-stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .ci-stat { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; backdrop-filter: blur(12px); }
    .ci-stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--white-dim); margin-bottom: 6px; }
    .ci-stat-value { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--white); }
    .ci-stat-value.cyan { color: var(--cyan); }

    .ci-tabs { display: flex; gap: 4px; margin-bottom: 24px; overflow-x: auto; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .ci-tab { padding: 10px 20px; font-family: var(--font-display); font-size: 0.78rem; font-weight: 500; letter-spacing: 0.5px; color: var(--white-dim); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
    .ci-tab:hover { color: var(--white); }
    .ci-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

    .ci-panel { display: none; }
    .ci-panel.active { display: block; }

    .ci-comp-card { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; backdrop-filter: blur(12px); margin-bottom: 16px; transition: border-color 0.2s; }
    .ci-comp-card:hover { border-color: var(--border-hover); }
    .ci-comp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .ci-comp-name { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; color: var(--white); }
    .ci-comp-url { font-size: 0.78rem; color: var(--cyan); text-decoration: none; }
    .ci-comp-url:hover { text-decoration: underline; }
    .ci-comp-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.78rem; color: var(--white-dim); }

    .ci-product-row { display: grid; grid-template-columns: 1fr 2fr 100px; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(0,212,255,0.04); align-items: center; }
    .ci-product-name { font-weight: 600; color: var(--white); }
    .ci-product-desc { color: var(--white-dim); font-size: 0.85rem; }
    .ci-product-price { color: var(--cyan); font-weight: 600; text-align: right; }

    .ci-tech-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .ci-tech-tag { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; background: rgba(0,212,255,0.08); color: var(--cyan); border: 1px solid rgba(0,212,255,0.15); }

    .ci-contact-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(0,212,255,0.04); font-size: 0.85rem; }

    .ci-endpoint-card { padding: 12px 16px; margin-bottom: 8px; border-radius: var(--radius-sm); font-family: 'Courier New', monospace; font-size: 0.8rem; word-break: break-all; }
    .ci-endpoint-high { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
    .ci-endpoint-medium { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); color: var(--amber); }
    .ci-endpoint-low { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); color: #60a5fa; }
    .ci-endpoint-info { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; }

    .ci-reveng-section { margin-bottom: 24px; }
    .ci-reveng-title { font-family: var(--font-display); font-size: 1rem; font-weight: 600; color: var(--cyan); margin-bottom: 8px; }
    .ci-reveng-body { font-size: 0.85rem; color: var(--white-dim); line-height: 1.6; white-space: pre-wrap; max-height: 400px; overflow-y: auto; padding: 16px; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); }

    .ci-intel-item { padding: 12px 16px; margin-bottom: 8px; background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .ci-intel-key { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--cyan); margin-bottom: 4px; }
    .ci-intel-val { font-size: 0.88rem; color: var(--white); }

    .ci-search { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
    .ci-search input { flex: 1; padding: 10px 16px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--white); font-family: var(--font-body); font-size: 0.88rem; outline: none; }
    .ci-search input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px var(--cyan-glow); }
    .ci-search input::placeholder { color: var(--white-muted); }

    .ci-expand-btn { background: none; border: 1px solid var(--border); color: var(--cyan); padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; }
    .ci-expand-btn:hover { background: var(--cyan-glow); border-color: var(--cyan); }

    .ci-empty { text-align: center; padding: 48px 24px; color: var(--white-dim); }
    .ci-empty svg { width: 48px; height: 48px; stroke: var(--white-muted); fill: none; stroke-width: 1.5; margin-bottom: 16px; }

    .ci-severity-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }
    .ci-sev-high, .ci-sev-critical { background: rgba(239,68,68,0.12); color: #f87171; }
    .ci-sev-medium { background: rgba(245,158,11,0.12); color: var(--amber); }
    .ci-sev-low { background: rgba(59,130,246,0.12); color: #60a5fa; }
    .ci-sev-info { background: rgba(34,197,94,0.12); color: #4ade80; }

    /* D1 Intel tables */
    .ci-formulation-card { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; backdrop-filter: blur(12px); }
    .ci-formulation-card:hover { border-color: rgba(168,85,247,0.4); }
    .ci-patent-card { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; backdrop-filter: blur(12px); }
    .ci-patent-card:hover { border-color: rgba(245,158,11,0.4); }
    .ci-market-card { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; backdrop-filter: blur(12px); }
    .ci-market-card:hover { border-color: rgba(34,197,94,0.4); }
    .ci-osint-card { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; backdrop-filter: blur(12px); }
    .ci-osint-card:hover { border-color: rgba(239,68,68,0.4); }
    .ci-financial-card { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; backdrop-filter: blur(12px); }
    .ci-financial-card:hover { border-color: rgba(59,130,246,0.4); }

    .ci-detail-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.82rem; }
    .ci-detail-label { color: var(--white-muted); min-width: 120px; font-weight: 500; flex-shrink: 0; }
    .ci-detail-value { color: var(--white); }
    .ci-source-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; background: rgba(0,212,255,0.08); color: var(--cyan); border: 1px solid rgba(0,212,255,0.15); }
    .ci-confidence-bar { display: inline-block; height: 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }

    @media (max-width: 768px) {
      .ci-stat-grid { grid-template-columns: 1fr 1fr; }
      .ci-contact-row { grid-template-columns: 1fr; }
      .ci-product-row { grid-template-columns: 1fr; }
      .ci-tabs { gap: 0; }
      .ci-tab { padding: 8px 12px; font-size: 0.72rem; }
    }
  </style>
</head>
<body>
  <script src="assets/js/api.js?v=20260316"></script>
  <script src="assets/js/auth.js?v=20260316"></script>
  <script src="assets/js/common.js?v=20260316"></script>
  <script>
  (function() {
    'use strict';
    var c = bgat.common;
    var SCRAPER_URL = 'https://permian-pulse-scraper.bmcii1976.workers.dev';

    var content = c.initPage({
      page: 'competitor-intel',
      title: 'S2 Intelligence Dashboard',
      subtitle: 'Permian Basin — Full-Spectrum Competitive Intelligence: OSINT, Patents, Formulations, Financials'
    });

    // Loading skeleton
    content.innerHTML =
      '<div class="ci-stat-grid">' + c.skeletonRows(10, 80).replace(/margin-bottom:8px/g, '') + '</div>' +
      '<div class="glass-card" style="padding:24px">' + c.skeletonRows(8, 40) + '</div>';

    // State
    var DATA = null;
    var INTEL = null; // D1 intelligence data
    var activeTab = 'overview';
    var searchTerm = '';
    var expandedReveng = {};

    // Competitor ID → name lookup (built from INTEL.competitors)
    var COMP_NAMES = {};

    // Load after auth
    wiAuth.subscribe(function(s) {
      if (s.user && !s.loading) loadData();
    });

    async function loadData() {
      try {
        // Parallel fetch: scrape data + D1 intel
        var [scrapeRes, intelRes] = await Promise.all([
          fetch(SCRAPER_URL + '/report-data'),
          fetch(SCRAPER_URL + '/intel-summary')
        ]);
        if (!scrapeRes.ok) throw new Error('Scrape HTTP ' + scrapeRes.status);
        DATA = await scrapeRes.json();

        // Intel may fail separately — don't block render
        if (intelRes.ok) {
          INTEL = await intelRes.json();
          // Build competitor ID→name map
          (INTEL.competitors || []).forEach(function(comp) {
            COMP_NAMES[comp.id] = comp.name;
          });
        } else {
          INTEL = { competitors: [], formulations: [], patents: [], market_intel: [], osint: [], financials: [] };
        }

        render();
      } catch(e) {
        content.innerHTML = '<div class="ci-empty"><p>Error loading intelligence data: ' + c.escapeHtml(e.message) + '</p><p style="margin-top:12px;font-size:0.8rem">Endpoint: ' + c.escapeHtml(SCRAPER_URL) + '</p></div>';
      }
    }

    function compName(id) {
      return COMP_NAMES[id] || ('Competitor #' + id);
    }

    function render() {
      if (!DATA) return;
      var d = DATA;
      var comps = d.competitors || [];
      var totals = d.totals || {};
      var pagesByComp = d.pages_by_competitor || [];

      // Flatten by_competitor objects into arrays with competitor_name
      // Products come from chemical_product_matrix (products_by_competitor is empty)
      var chemMatrixRaw = d.chemical_product_matrix || {};
      var products = [];
      Object.keys(chemMatrixRaw).forEach(function(cn) {
        (chemMatrixRaw[cn] || []).forEach(function(name) {
          products.push({ competitor_name: cn, name: name, description: '', price_range: '' });
        });
      });
      var techStack = flattenByComp(d.tech_by_competitor);
      var endpoints = flattenByComp(d.endpoints_by_competitor);
      var contacts = flattenByComp(d.contacts_by_competitor);
      var reveng = flattenByComp(d.reveng_by_competitor);

      // Intel matrices
      var chemMatrix = d.chemical_product_matrix || {};
      var serviceMap = d.service_area_map || {};
      var certMap = d.certification_map || {};

      // Which competitors were scraped
      var scrapedSet = {};
      pagesByComp.forEach(function(p) { scrapedSet[p.competitor_name] = p; });

      var html = '';

      // D1 intel counts
      var intelFormulations = INTEL ? (INTEL.formulations || []) : [];
      var intelPatents = INTEL ? (INTEL.patents || []) : [];
      var intelMarket = INTEL ? (INTEL.market_intel || []) : [];
      var intelOsint = INTEL ? (INTEL.osint || []) : [];
      var intelFinancials = INTEL ? (INTEL.financials || []) : [];
      var totalIntelRecords = intelFormulations.length + intelPatents.length + intelMarket.length + intelOsint.length + intelFinancials.length;

      // Stats grid — scrape data + D1 intel combined
      html += '<div class="ci-stat-grid">';
      html += statBox('Competitors', totals.competitors || comps.length);
      html += statBox('Scraped', Object.keys(scrapedSet).length, true);
      html += statBox('Pages Analyzed', totals.pages_scraped || 0);
      html += statBox('D1 Intel Records', totalIntelRecords, true);
      html += statBox('Formulations', intelFormulations.length);
      html += statBox('Patents', intelPatents.length);
      html += statBox('Market Intel', intelMarket.length);
      html += statBox('OSINT Records', intelOsint.length);
      html += statBox('Financials', intelFinancials.length);
      html += statBox('Endpoints Found', totals.exposed_endpoints || endpoints.length);
      html += '</div>';

      // Tabs — original 7 + 5 new intel tabs
      html += '<div class="ci-tabs" id="ciTabs">';
      var tabs = [
        { id: 'overview', label: 'Overview' },
        { id: 'formulations', label: 'Formulations (' + intelFormulations.length + ')' },
        { id: 'patents', label: 'Patents (' + intelPatents.length + ')' },
        { id: 'market', label: 'Market Intel (' + intelMarket.length + ')' },
        { id: 'osint', label: 'OSINT (' + intelOsint.length + ')' },
        { id: 'financials', label: 'Financials (' + intelFinancials.length + ')' },
        { id: 'products', label: 'Products (' + products.length + ')' },
        { id: 'tech', label: 'Tech Stack (' + techStack.length + ')' },
        { id: 'contacts', label: 'Contacts (' + contacts.length + ')' },
        { id: 'endpoints', label: 'Endpoints (' + endpoints.length + ')' },
        { id: 'reveng', label: 'RevEng (' + reveng.length + ')' },
        { id: 'intel', label: 'Scrape Intel' }
      ];
      tabs.forEach(function(t) {
        html += '<button class="ci-tab' + (t.id === activeTab ? ' active' : '') + '" data-tab="' + t.id + '">' + t.label + '</button>';
      });
      html += '</div>';

      // Search
      html += '<div class="ci-search"><input type="text" id="ciSearch" placeholder="Search competitors, products, data..." value="' + c.escapeHtml(searchTerm) + '"></div>';

      // Panels
      html += '<div id="ciPanels">';
      html += renderOverview(comps, pagesByComp, techStack, products, scrapedSet);
      html += renderFormulations(intelFormulations);
      html += renderPatents(intelPatents);
      html += renderMarketIntel(intelMarket);
      html += renderOSINT(intelOsint);
      html += renderFinancials(intelFinancials);
      html += renderProducts(products);
      html += renderTech(techStack);
      html += renderContacts(contacts);
      html += renderEndpoints(endpoints);
      html += renderReveng(reveng);
      html += renderIntel(chemMatrix, serviceMap, certMap);
      html += '</div>';

      content.innerHTML = html;

      // Event listeners
      document.getElementById('ciTabs').addEventListener('click', function(e) {
        if (e.target.classList.contains('ci-tab')) {
          activeTab = e.target.getAttribute('data-tab');
          activatePanels();
        }
      });

      document.getElementById('ciSearch').addEventListener('input', function(e) {
        searchTerm = e.target.value.toLowerCase();
        filterCards();
      });

      // Expand buttons for reveng
      document.querySelectorAll('.ci-expand-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var id = this.getAttribute('data-id');
          var body = document.getElementById('reveng-body-' + id);
          if (body) {
            var vis = body.style.display !== 'none';
            body.style.display = vis ? 'none' : 'block';
            this.textContent = vis ? 'Expand' : 'Collapse';
          }
        });
      });

      activatePanels();
    }

    // Flatten {CompName: [items]} → [{...item, competitor_name}, ...]
    function flattenByComp(obj) {
      if (!obj || typeof obj !== 'object') return [];
      var result = [];
      Object.keys(obj).forEach(function(name) {
        var items = obj[name];
        if (Array.isArray(items)) {
          items.forEach(function(item) {
            if (typeof item === 'object' && item !== null) {
              item.competitor_name = name;
              result.push(item);
            } else {
              result.push({ value: String(item), competitor_name: name });
            }
          });
        }
      });
      return result;
    }

    function activatePanels() {
      document.querySelectorAll('.ci-tab').forEach(function(t) {
        t.classList.toggle('active', t.getAttribute('data-tab') === activeTab);
      });
      document.querySelectorAll('.ci-panel').forEach(function(p) {
        p.classList.toggle('active', p.getAttribute('data-panel') === activeTab);
      });
    }

    function filterCards() {
      document.querySelectorAll('[data-search]').forEach(function(el) {
        var text = el.getAttribute('data-search').toLowerCase();
        el.style.display = (!searchTerm || text.indexOf(searchTerm) !== -1) ? '' : 'none';
      });
    }

    function statBox(label, value, cyan) {
      return '<div class="ci-stat"><div class="ci-stat-label">' + label + '</div><div class="ci-stat-value' + (cyan ? ' cyan' : '') + '">' + value + '</div></div>';
    }

    // ── OVERVIEW TAB ── shows ALL scraped data inline per competitor
    function renderOverview(comps, pagesByComp, techStack, products, scrapedSet) {
      var html = '<div class="ci-panel' + (activeTab === 'overview' ? ' active' : '') + '" data-panel="overview">';

      // Pull all the enrichment data
      var chemMatrix = DATA.chemical_product_matrix || {};
      var serviceMap = DATA.service_area_map || {};
      var certMap = DATA.certification_map || {};
      var contactsByComp = DATA.contacts_by_competitor || {};
      var endpointsByComp = DATA.endpoints_by_competitor || {};
      var revengByComp = DATA.reveng_by_competitor || {};
      var techByComp = DATA.tech_by_competitor || {};

      var ovRevId = 0;

      comps.forEach(function(comp) {
        var name = comp.name || 'Unknown';
        var pageInfo = scrapedSet[name];
        var totalPages = pageInfo ? (pageInfo.pages || 0) : 0;
        var intelCount = pageInfo ? (pageInfo.intel_count || 0) : 0;

        // Per-competitor data
        var compChems = chemMatrix[name] || [];
        var compAreas = serviceMap[name] || [];
        var compCerts = certMap[name] || [];
        var compContacts = contactsByComp[name] || [];
        var compEndpoints = endpointsByComp[name] || [];
        var compReveng = revengByComp[name] || [];
        var compTech = techByComp[name] || [];

        var searchText = name + ' ' + (comp.website_url || '') + ' ' + (comp.location || '') + ' ' + compChems.join(' ');

        html += '<div class="ci-comp-card" data-search="' + c.escapeHtml(searchText) + '">';

        // Header
        html += '<div class="ci-comp-header">';
        html += '<div>';
        html += '<div class="ci-comp-name">' + c.escapeHtml(name) + '</div>';
        if (comp.website_url) html += '<a href="' + c.escapeHtml(comp.website_url) + '" target="_blank" rel="noopener" class="ci-comp-url">' + c.escapeHtml(comp.website_url) + '</a>';
        html += '</div>';
        html += pageInfo
          ? '<span class="badge badge-success">Scraped</span>'
          : '<span class="badge badge-warning">Pending</span>';
        html += '</div>';

        // Meta bar
        html += '<div class="ci-comp-meta">';
        if (comp.location) html += '<span>📍 ' + c.escapeHtml(comp.location) + '</span>';
        html += '<span>Pages: ' + totalPages + '</span>';
        html += '<span>Intel Items: ' + intelCount + '</span>';
        if (pageInfo && pageInfo.page_types) html += '<span>Types: ' + c.escapeHtml(pageInfo.page_types) + '</span>';
        html += '</div>';

        // Only show data sections for scraped competitors
        if (!pageInfo) {
          html += '</div>';
          return;
        }

        // ─── Chemical Products ───
        if (compChems.length > 0) {
          html += '<div style="margin-top:16px">';
          html += '<div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);margin-bottom:6px;font-weight:600">Chemical Products (' + compChems.length + ')</div>';
          html += '<div class="ci-tech-grid">';
          compChems.forEach(function(p) {
            html += '<span class="ci-tech-tag" style="background:rgba(168,85,247,0.08);color:#c084fc;border-color:rgba(168,85,247,0.15)">' + c.escapeHtml(p) + '</span>';
          });
          html += '</div></div>';
        }

        // ─── Tech Stack ───
        if (compTech.length > 0) {
          html += '<div style="margin-top:12px">';
          html += '<div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);margin-bottom:6px;font-weight:600">Tech Stack (' + compTech.length + ')</div>';
          html += '<div class="ci-tech-grid">';
          compTech.forEach(function(t) {
            html += '<span class="ci-tech-tag">' + c.escapeHtml(t.technology || 'Unknown');
            if (t.category) html += ' <span style="opacity:0.5;font-size:0.65rem">(' + c.escapeHtml(t.category) + ')</span>';
            html += '</span>';
          });
          html += '</div></div>';
        }

        // ─── Contacts ───
        if (compContacts.length > 0) {
          html += '<div style="margin-top:12px">';
          html += '<div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);margin-bottom:6px;font-weight:600">Contacts (' + compContacts.length + ')</div>';
          html += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
          // Dedup contacts by value
          var seenVals = {};
          compContacts.forEach(function(ct) {
            var v = ct.value || '';
            if (seenVals[v]) return;
            seenVals[v] = true;
            var icon = ct.type === 'email' ? '✉' : ct.type === 'phone' ? '📞' : '🔗';
            if (v.indexOf('@') !== -1) {
              html += '<a href="mailto:' + c.escapeHtml(v) + '" style="padding:4px 10px;border-radius:6px;font-size:0.78rem;background:rgba(59,130,246,0.08);color:#60a5fa;border:1px solid rgba(59,130,246,0.15);text-decoration:none">' + icon + ' ' + c.escapeHtml(v) + '</a>';
            } else {
              html += '<span style="padding:4px 10px;border-radius:6px;font-size:0.78rem;background:rgba(59,130,246,0.08);color:#60a5fa;border:1px solid rgba(59,130,246,0.15)">' + icon + ' ' + c.escapeHtml(v) + '</span>';
            }
          });
          html += '</div></div>';
        }

        // ─── Exposed Endpoints ───
        if (compEndpoints.length > 0) {

          if (m.source) html += '<span class="ci-source-tag">' + c.escapeHtml(m.source) + '</span>';
          if (m.confidence) {
            var conf = parseInt(m.confidence) || 0;
            var cPct = Math.min(conf, 100);
            var cClr = cPct >= 80 ? '#4ade80' : cPct >= 50 ? 'var(--amber)' : '#ef4444';
            html += '<span style="font-size:0.72rem;color:var(--white-muted)">Confidence: ' + conf + '%</span>';
            html += '<span class="ci-confidence-bar" style="width:' + cPct + 'px;background:' + cClr + '"></span>';
          }
          if (m.date_collected) html += '<span style="font-size:0.72rem;color:var(--white-muted)">' + c.escapeHtml(m.date_collected) + '</span>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    // ── OSINT TAB (D1) ──
    function renderOSINT(items) {
      var html = '<div class="ci-panel' + (activeTab === 'osint' ? ' active' : '') + '" data-panel="osint">';
      if (items.length === 0) {
        html += '<div class="ci-empty"><p>No OSINT data collected yet.</p></div></div>';
        return html;
      }
      // Severity sort: critical > high > medium > low > info
      var sevOrder = { critical: 0, high: 1, medium: 2, low: 3, info: 4 };
      var sorted = items.slice().sort(function(a, b) {
        return (sevOrder[(a.severity||'info').toLowerCase()] || 4) - (sevOrder[(b.severity||'info').toLowerCase()] || 4);
      });

      var grouped = {};
      sorted.forEach(function(o) { var cn = o.competitor_name || compName(o.competitor_id); if (!grouped[cn]) grouped[cn] = []; grouped[cn].push(o); });

      Object.keys(grouped).sort().forEach(function(cn) {
        var records = grouped[cn];
        var searchText = cn + ' ' + records.map(function(o) { return (o.finding_type||o.data_type||'') + ' ' + (o.finding_value||o.data_value||'') + ' ' + (o.severity||''); }).join(' ');
        html += '<div class="ci-comp-card" data-search="' + c.escapeHtml(searchText) + '">';
        html += '<div class="ci-comp-header"><div class="ci-comp-name">' + c.escapeHtml(cn) + '</div>';
        var critCount = records.filter(function(o) { return (o.severity||'').toLowerCase() === 'critical' || (o.severity||'').toLowerCase() === 'high'; }).length;
        html += '<span class="badge ' + (critCount > 0 ? 'badge-danger' : 'badge-info') + '">' + records.length + ' records' + (critCount > 0 ? ' (' + critCount + ' HIGH+)' : '') + '</span></div>';

        // Group by finding_type (D1) or data_type (legacy)
        var byType = {};
        records.forEach(function(o) { var dt = o.finding_type || o.data_type || 'other'; if (!byType[dt]) byType[dt] = []; byType[dt].push(o); });

        Object.keys(byType).forEach(function(dt) {
          html += '<div style="margin-bottom:12px">';
          html += '<div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--cyan);margin-bottom:6px;font-weight:600">' + c.escapeHtml(dt) + ' (' + byType[dt].length + ')</div>';
          byType[dt].forEach(function(o) {
            html += '<div class="ci-osint-card">';
            html += '<div style="display:flex;justify-content:space-between;align-items:start">';
            html += '<div style="flex:1;font-size:0.82rem;color:var(--white);word-break:break-all">' + c.escapeHtml(o.finding_value || o.data_value || '—') + '</div>';
            if (o.severity) {
              var sev = o.severity.toLowerCase();
              var sevBg = sev === 'critical' ? 'rgba(239,68,68,0.15)' : sev === 'high' ? 'rgba(245,158,11,0.15)' : sev === 'medium' ? 'rgba(59,130,246,0.12)' : 'rgba(100,116,139,0.12)';
              var sevClr = sev === 'critical' ? '#ef4444' : sev === 'high' ? 'var(--amber)' : sev === 'medium' ? '#60a5fa' : 'var(--white-muted)';
              html += '<span style="padding:2px 8px;border-radius:4px;font-size:0.6rem;font-weight:700;background:' + sevBg + ';color:' + sevClr + ';text-transform:uppercase;flex-shrink:0;margin-left:8px">' + c.escapeHtml(o.severity) + '</span>';
            }
            html += '</div>';
            if (o.details) html += '<div style="font-size:0.75rem;color:var(--white-muted);margin-top:4px;line-height:1.4">' + c.escapeHtml(o.details) + '</div>';
            html += '<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">';
            if (o.source_tool || o.source) html += '<span class="ci-source-tag">' + c.escapeHtml(o.source_tool || o.source) + '</span>';
            if (o.scan_type) html += '<span class="ci-source-tag" style="background:rgba(168,85,247,0.12);color:#a855f7">' + c.escapeHtml(o.scan_type) + '</span>';
            if (o.domain) html += '<span class="ci-source-tag" style="background:rgba(59,130,246,0.12);color:#60a5fa">' + c.escapeHtml(o.domain) + '</span>';
            if (o.scanned_at || o.discovered_at) html += '<span style="font-size:0.7rem;color:var(--white-muted)">' + c.escapeHtml(o.scanned_at || o.discovered_at) + '</span>';
            html += '</div>';
            html += '</div>';
          });
          html += '</div>';
        });
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    // ── FINANCIALS TAB (D1) ──
    function renderFinancials(items) {
      var html = '<div class="ci-panel' + (activeTab === 'financials' ? ' active' : '') + '" data-panel="financials">';
      if (items.length === 0) {
        html += '<div class="ci-empty"><p>No financial data collected yet.</p></div></div>';
        return html;
      }
      var grouped = {};
      items.forEach(function(f) { var cn = compName(f.competitor_id); if (!grouped[cn]) grouped[cn] = []; grouped[cn].push(f); });

      Object.keys(grouped).sort().forEach(function(cn) {
        var fins = grouped[cn];
        var searchText = cn + ' ' + fins.map(function(f) { return (f.fiscal_year||'') + ' ' + (f.segment||'') + ' ' + (f.revenue||''); }).join(' ');
        html += '<div class="ci-comp-card" data-search="' + c.escapeHtml(searchText) + '">';
        html += '<div class="ci-comp-header"><div class="ci-comp-name">' + c.escapeHtml(cn) + '</div>';
        html += '<span class="badge badge-info">' + fins.length + ' records</span></div>';

        fins.forEach(function(f) {
          html += '<div class="ci-financial-card">';
          html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
          html += '<div style="font-weight:600;color:var(--white);font-size:0.95rem">' + c.escapeHtml(f.fiscal_year || '—') + '</div>';
          if (f.revenue) {
            var rev = parseFloat(f.revenue);
            var revStr = isNaN(rev) ? c.escapeHtml(String(f.revenue)) : '$' + rev.toLocaleString();
            html += '<div style="font-size:1.1rem;font-weight:700;color:#4ade80;font-family:monospace">' + revStr + '</div>';
          }
          html += '</div>';
          if (f.segment) html += '<div class="ci-detail-row"><span class="ci-detail-label">Segment</span><span class="ci-detail-value">' + c.escapeHtml(f.segment) + '</span></div>';
          if (f.gross_margin) html += '<div class="ci-detail-row"><span class="ci-detail-label">Gross Margin</span><span class="ci-detail-value" style="color:#4ade80">' + c.escapeHtml(String(f.gross_margin)) + (String(f.gross_margin).indexOf('%') === -1 ? '%' : '') + '</span></div>';
          if (f.operating_income) {
            var oi = parseFloat(f.operating_income);
            var oiStr = isNaN(oi) ? c.escapeHtml(String(f.operating_income)) : '$' + oi.toLocaleString();
            html += '<div class="ci-detail-row"><span class="ci-detail-label">Operating Income</span><span class="ci-detail-value">' + oiStr + '</span></div>';
          }
          if (f.key_metrics) html += '<div style="margin-top:8px;padding:8px 12px;background:rgba(59,130,246,0.05);border-left:3px solid #3b82f6;font-size:0.78rem;color:var(--white-dim);line-height:1.5">' + c.escapeHtml(f.key_metrics) + '</div>';
          html += '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">';
          if (f.source) html += '<span class="ci-source-tag">' + c.escapeHtml(f.source) + '</span>';
          if (f.extracted_at) html += '<span style="font-size:0.7rem;color:var(--white-muted)">' + c.escapeHtml(f.extracted_at) + '</span>';
          html += '</div>';
          html += '</div>';
        });
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    // ── INTEL DATA TAB ──
    function renderIntel(chemMatrix, serviceMap, certMap) {
      var html = '<div class="ci-panel' + (activeTab === 'intel' ? ' active' : '') + '" data-panel="intel">';

      var hasAny = Object.keys(chemMatrix).length > 0 || Object.keys(serviceMap).length > 0 || Object.keys(certMap).length > 0;
      if (!hasAny) {
        html += '<div class="ci-empty"><p>No intelligence data extracted yet.</p></div>';
        html += '</div>';
        return html;
      }

      // Chemical Product Matrix
      if (Object.keys(chemMatrix).length > 0) {
        html += '<h3 style="font-family:var(--font-display);color:var(--cyan);margin-bottom:16px;font-size:1rem">Chemical Products by Competitor</h3>';
        Object.keys(chemMatrix).forEach(function(cn) {
          var items = chemMatrix[cn] || [];
          if (items.length === 0) return;
          var searchText = cn + ' ' + items.join(' ');
          html += '<div class="ci-comp-card" data-search="' + c.escapeHtml(searchText) + '">';
          html += '<div class="ci-comp-header"><div class="ci-comp-name">' + c.escapeHtml(cn) + '</div>';
          html += '<span class="badge badge-info">' + items.length + ' products</span></div>';
          html += '<div class="ci-tech-grid">';
          items.forEach(function(item) {
            html += '<span class="ci-tech-tag">' + c.escapeHtml(item) + '</span>';
          });
          html += '</div></div>';
        });
      }

      // Service Area Map
      if (Object.keys(serviceMap).length > 0) {
        html += '<h3 style="font-family:var(--font-display);color:var(--cyan);margin:24px 0 16px;font-size:1rem">Service Areas by Competitor</h3>';
        Object.keys(serviceMap).forEach(function(cn) {
          var areas = serviceMap[cn] || [];
          if (areas.length === 0) return;
          var searchText = cn + ' ' + areas.join(' ');
          html += '<div class="ci-comp-card" data-search="' + c.escapeHtml(searchText) + '">';
          html += '<div class="ci-comp-header"><div class="ci-comp-name">' + c.escapeHtml(cn) + '</div>';
          html += '<span class="badge badge-info">' + areas.length + ' areas</span></div>';
          html += '<div class="ci-tech-grid">';
          areas.forEach(function(a) {
            html += '<span class="ci-tech-tag" style="background:rgba(34,197,94,0.08);color:#4ade80;border-color:rgba(34,197,94,0.15)">' + c.escapeHtml(a) + '</span>';
          });
          html += '</div></div>';
        });
      }

      // Certification Map
      if (Object.keys(certMap).length > 0) {
        html += '<h3 style="font-family:var(--font-display);color:var(--cyan);margin:24px 0 16px;font-size:1rem">Certifications by Competitor</h3>';
        Object.keys(certMap).forEach(function(cn) {
          var certs = certMap[cn] || [];
          if (certs.length === 0) return;
          var searchText = cn + ' ' + certs.join(' ');
          html += '<div class="ci-comp-card" data-search="' + c.escapeHtml(searchText) + '">';
          html += '<div class="ci-comp-header"><div class="ci-comp-name">' + c.escapeHtml(cn) + '</div>';
          html += '<span class="badge badge-info">' + certs.length + ' certs</span></div>';
          html += '<div class="ci-tech-grid">';
          certs.forEach(function(cert) {
            html += '<span class="ci-tech-tag" style="background:rgba(245,158,11,0.08);color:var(--amber);border-color:rgba(245,158,11,0.15)">' + c.escapeHtml(cert) + '</span>';
          });
          html += '</div></div>';
        });
      }

      html += '</div>';
      return html;
    }

  })();
  </script>
</body>
</html>
